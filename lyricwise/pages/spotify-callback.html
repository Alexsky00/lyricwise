<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>LyricWise — Spotify</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;color:var(--text-secondary);font-family:'DM Sans',sans-serif;">
  <div style="font-size:2rem;">♫</div>
  <div>Connecting Spotify…</div>
</div>

<script type="module">
import { handleSpotifyCallback, SPOTIFY_CLIENT_ID } from '../js/spotify-auth.js';

// Show the exact URI to register, in case of mismatch
const callbackUri = `${window.location.origin}${window.location.pathname}`;
console.info('[Spotify] This page URI (register this in Spotify dashboard):', callbackUri);

const error = new URLSearchParams(window.location.search).get('error');
if (error) {
  document.querySelector('div > div:last-child').innerHTML =
    `<strong style="color:#f87171">Spotify error: ${error}</strong><br><br>
     <span style="font-size:.85rem">Register this Redirect URI in your<br>
     <a href="https://developer.spotify.com/dashboard" target="_blank" style="color:#1DB954">Spotify Developer Dashboard</a>:</span><br><br>
     <code style="background:rgba(255,255,255,.08);padding:.4rem .7rem;border-radius:6px;font-size:.8rem;word-break:break-all">${callbackUri}</code>`;
} else {
  const result = await handleSpotifyCallback();
  if (result) {
    sessionStorage.setItem('sp_result', JSON.stringify(result));
  }
  const returnTo = sessionStorage.getItem('sp_return') || './profile.html';
  sessionStorage.removeItem('sp_return');
  window.location.replace(returnTo);
}
</script>
</body>
</html>
